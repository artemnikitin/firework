<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Firework deployment</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <header>
    <div class="brand"><strong>Firework</strong><span id="updated">Loading…</span></div>
    <nav aria-label="Primary navigation">
      <button type="button" data-view="overview">Overview</button>
      <button type="button" data-view="nodes">Nodes</button>
      <button type="button" data-view="services">Services</button>
      <form method="post" action="/logout"><button type="submit" class="sign-out">Sign out</button></form>
    </nav>
  </header>
  <main>
    <section id="toolbar" class="toolbar" hidden>
      <input id="search" type="search" placeholder="Search by name" aria-label="Search by name">
      <select id="filter" aria-label="Filter by state"><option value="">All states</option></select>
    </section>
    <div id="error" role="alert" hidden></div>
    <div id="content" aria-live="polite"></div>
  </main>
  <script src="/assets/app.js" defer></script>
</body>
</html>
