# Firework control-plane configuration.
# Roles: registry | events | controller | api | all
role: "all"

registry_listen_addr: ":9443"
events_listen_addr: ":9444"
api_listen_addr: ":9445"
# Use a distinct secret file for the read-only operator API and embedded UI.
operator_token_file: "/run/secrets/firework/operator_token"
# Deployment-owned DNS suffix used to turn metadata.subdomain into a public
# service URL in the status API/UI. Exact metadata.host values do not need it.
ingress_domain: "example.com"

state:
  backend: "s3"
  prefix: "cp/v1"
  s3:
    bucket: "my-firework-controlplane"
    region: "us-east-1"
    # endpoint_url: "http://localhost:4566"
    force_path_style: false
  # For GCS, set backend: "gcs" and use this block instead. Empty
  # credentials_file uses Application Default Credentials.
  # gcs:
  #   bucket: "my-firework-controlplane"
  #   project: "my-gcp-project"
  #   credentials_file: ""

leader_lease_ttl: "30s"
leader_renew_interval: "10s"
node_stale_ttl: "45s"
controller_tick: "10s"

target_branch: "main"
# config_dir: "firework"
github_webhook_secret: "replace-me"

tls:
  cert_file: "/etc/firework/tls/controlplane.crt"
  key_file: "/etc/firework/tls/controlplane.key"
  client_ca_file: "/etc/firework/pki/node-ca.crt"

enrollment:
  ca_file: "/etc/firework/pki/node-ca.crt"
  ca_key_file: "/etc/firework/pki/node-ca.key"
  node_cert_ttl: "24h"
  bootstrap_tokens:
    - token: "replace-me-bootstrap-token"
      node_id: "node-1"
