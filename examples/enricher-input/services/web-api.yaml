# Service definition for the web API.
# The enricher fills in missing fields from defaults.yaml.
# All services with the same node_type are grouped into one node config.
name: "web-api"
source_image: "nginx:alpine"
image: "/var/lib/images/web-api-rootfs.ext4"
node_type: "general-purpose"
vcpus: 2
memory_mb: 512
network: true
port_forwards:
  - host_port: 80
    vm_port: 8080
health_check:
  type: "http"
  port: 8080
  path: "/health"
metadata:
  # Portable, deployment-neutral routing: the final hostname is
  # <subdomain>.<ingress_domain>, where ingress_domain is supplied by the
  # deployed agent. Use the exact `host:` form only for custom/internal hosts
  # that the deployment's DNS/TLS does not manage (see examples/nodes/node-1.yaml).
  subdomain: "web-api"
  environment: "production"
  version: "1.2.3"
