version: 2

project_name: firework

builds:
  - id: firework-agent
    main: ./cmd/agent
    binary: firework-agent
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags:
      - -s -w -X github.com/artemnikitin/firework/internal/version.Version={{.Version}} -X github.com/artemnikitin/firework/internal/version.Commit={{.ShortCommit}} -X github.com/artemnikitin/firework/internal/version.BuildTime={{.Date}}

  - id: firework-controlplane
    main: ./cmd/controlplane
    binary: firework-controlplane
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags:
      - -s -w -X github.com/artemnikitin/firework/internal/version.Version={{.Version}} -X github.com/artemnikitin/firework/internal/version.Commit={{.ShortCommit}} -X github.com/artemnikitin/firework/internal/version.BuildTime={{.Date}}

  - id: fc-init
    main: ./cmd/fc-init
    binary: fc-init
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - arm64
      - amd64

archives:
  - id: firework-agent-binaries
    ids:
      - firework-agent
    name_template: "firework-agent-{{ .Os }}-{{ .Arch }}"
    formats:
      - binary
    files: []

  - id: firework-controlplane-binaries
    ids:
      - firework-controlplane
    name_template: "firework-controlplane-{{ .Os }}-{{ .Arch }}"
    formats:
      - binary
    files: []

  - id: firework-fc-init-binary
    ids:
      - fc-init
    name_template: "fc-init-{{ .Os }}-{{ .Arch }}"
    formats:
      - binary
    files: []

checksum:
  name_template: SHA256SUMS

source:
  enabled: false

release:
  # GitHub immutable releases reject asset uploads to already-published
  # releases. Create as draft first, upload assets, then publish in workflow.
  draft: true
  replace_existing_draft: true
